name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @elogbook/shared typecheck
      - run: pnpm --filter @elogbook/web typecheck
      - run: pnpm --filter @elogbook/mobile typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @elogbook/web lint
      - run: pnpm --filter @elogbook/mobile lint

  validate-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate migration order
        run: |
          echo "Validating migration file ordering..."
          ls -1 supabase/migrations/*.sql | sort -c && echo "Migration order OK"
      - name: Check for duplicate migration numbers
        run: |
          echo "Checking for duplicate migration sequence numbers..."
          duplicates=$(ls -1 supabase/migrations/*.sql | sed -n 's/.*\/0*\([0-9]*\)_.*/\1/p' | sort | uniq -d)
          if [ -n "$duplicates" ]; then
            echo "ERROR: Duplicate migration sequence numbers found:"
            echo "$duplicates"
            for num in $duplicates; do
              echo "  Files with number $num:"
              ls -1 supabase/migrations/*_*.sql | grep -E "^0*${num}_"
            done
            exit 1
          fi
          echo "No duplicate migration numbers found"

  test:
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    needs: [typecheck, lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:web

  audit:
    name: pnpm audit + license check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level=high

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: cd apps/web && PLAYWRIGHT_BASE_URL=http://localhost:3000 pnpm test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_LOCAL }}
      # Note: e2e requires a running dev server. In CI this is wired via
      # the webServer block in playwright.config.ts which calls pnpm dev.
