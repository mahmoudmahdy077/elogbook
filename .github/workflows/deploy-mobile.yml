name: Build Mobile

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - 'package.json'

concurrency:
  group: deploy-mobile-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check mobile app
        run: pnpm --filter @elogbook/mobile typecheck

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint mobile app
        run: pnpm --filter @elogbook/mobile lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Expo prebuild
        run: pnpm --filter @elogbook/mobile expo prebuild --clean
      # TODO(P5.1): Replace placeholder with actual EAS build once EXPO_TOKEN is configured
      # Uncomment and configure the following when ready:
      # - uses: expo/expo-github-action@v9
      #   with:
      #     eas-version: latest
      #     token: ${{ secrets.EXPO_TOKEN }}
      # - name: EAS Build (all platforms)
      #   run: eas build --platform all --non-interactive --no-wait
      #   env:
      #     EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      #     EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - name: Verify build placeholder
        run: echo "Mobile build pipeline ready — EAS build will run on main pushes to apps/mobile/**"
