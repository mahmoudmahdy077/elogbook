name: Deploy Preview (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PNPM_VERSION: 9

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check all workspaces
        run: pnpm -r typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test

  deploy-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [typecheck, test]
    environment:
      name: preview
      url: ${{ steps.vercel-deploy.outputs.url }}
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel (preview)
        id: vercel-deploy
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--build-env NEXT_PUBLIC_SUPABASE_URL=${{ secrets.PREVIEW_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }} --build-env NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.PREVIEW_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}'

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const previewUrl = '${{ steps.vercel-deploy.outputs.url }}';
            const sha = context.payload.pull_request.head.sha;
            const shortSha = sha.substring(0, 7);

            // Remove existing preview comments by this action to keep the PR clean
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComments = comments.filter(c =>
              c.user.type === 'Bot' && c.body.includes('🚀 Preview deployment')
            );

            for (const comment of botComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
              });
            }

            // Post the new preview URL
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '🚀 **Preview deployment ready!**',
                '',
                '| Detail | Value |',
                '| ------ | ----- |',
                `| **Preview URL** | [${previewUrl}](${previewUrl}) |`,
                `| **Commit** | [${shortSha}](https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${sha}) |`,
                `| **Branch** | ${context.payload.pull_request.head.ref} |`,
                `| **Environment** | Preview (staging) |`,
                '',
                '> ⚠️ This preview uses a staging Supabase project. Data may differ from production.',
                '',
                '---',
                '_Generated by deploy-preview workflow_',
              ].join('\n'),
            });
