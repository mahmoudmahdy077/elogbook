name: Semgrep

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, feat/**, fix/**, security/**]
  schedule:
    - cron: '23 4 * * 2'  # Tuesdays 04:23 UTC

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: returntocorp/semgrep:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Semgrep (custom config — blocking)
        # P7.2: our curated .semgrep.yml runs with --error so any
        # ERROR-severity finding blocks the build.
        run: |
          semgrep \
            --config .semgrep.yml \
            --error \
            --sarif --output semgrep-custom.sarif \
            --metrics off \
            --exclude '**/node_modules/**' \
            --exclude '**/.next/**' \
            --exclude '**/dist/**' \
            --exclude '**/build/**' \
            .
        env:
          SEMGREP_SEND_METRICS: "off"

      - name: Run Semgrep (community rules — advisory)
        # Community rules are advisory only; findings won't block CI.
        continue-on-error: true
        run: |
          semgrep \
            --config p/typescript \
            --config p/owasp-top-ten \
            --config p/javascript \
            --sarif --output semgrep-community.sarif \
            --metrics off \
            --exclude '**/node_modules/**' \
            --exclude '**/.next/**' \
            --exclude '**/dist/**' \
            --exclude '**/build/**' \
            .
        env:
          SEMGREP_SEND_METRICS: "off"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-custom.sarif
          category: semgrep-custom

      - name: Upload community SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-community.sarif
          category: semgrep-community

      - name: Upload SARIF artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif
          path: semgrep*.sarif
          retention-days: 30
