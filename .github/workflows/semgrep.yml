name: Semgrep

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, feat/**, fix/**, security/**]
  schedule:
    - cron: '23 4 * * 2'  # Tuesdays 04:23 UTC

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: returntocorp/semgrep:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep (custom config)
        # P7.2: run with our curated .semgrep.yml. Findings are uploaded
        # as SARIF and visible in the Security tab. We do not use --error
        # here because 19+ pre-existing findings would block every build;
        # fix them incrementally.
        run: |
          semgrep \
            --config .semgrep.yml \
            --sarif --output semgrep-custom.sarif \
            --metrics off \
            --exclude '**/node_modules/**' \
            --exclude '**/.next/**' \
            --exclude '**/dist/**' \
            --exclude '**/build/**' \
            .
        env:
          SEMGREP_SEND_METRICS: "off"

      - name: Run Semgrep (community rules — advisory)
        # Community rules are advisory only; findings won't block CI.
        continue-on-error: true
        run: |
          semgrep \
            --config p/typescript \
            --config p/owasp-top-ten \
            --config p/javascript \
            --sarif --output semgrep-community.sarif \
            --metrics off \
            --exclude '**/node_modules/**' \
            --exclude '**/.next/**' \
            --exclude '**/dist/**' \
            --exclude '**/build/**' \
            .
        env:
          SEMGREP_SEND_METRICS: "off"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-custom.sarif
          category: semgrep-custom

      - name: Upload community SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-community.sarif
          category: semgrep-community

      - name: Upload SARIF artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif
          path: semgrep*.sarif
          retention-days: 30
