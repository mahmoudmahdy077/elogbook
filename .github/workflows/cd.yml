name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------------
  # Deploy web to Vercel
  # ----------------------------------------------------------------------
  web:
    name: Deploy Web (Vercel)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:web
      - name: Deploy to Vercel
        run: |
          npx vercel deploy --prod --yes \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --scope=mahmoudmahdy077s-projects \
            2>&1 | tee /tmp/vercel-deploy.log
          DEPLOY_URL=$(grep -oP 'https://[^ ]+\.vercel\.app' /tmp/vercel-deploy.log | head -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

  # ----------------------------------------------------------------------
  # Push database migrations
  # ----------------------------------------------------------------------
  db:
    name: Push DB migrations
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - run: supabase db push --db-url ${{ secrets.SUPABASE_DB_URL }} --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ----------------------------------------------------------------------
  # Deploy edge functions
  # ----------------------------------------------------------------------
  functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    needs: [db]
    strategy:
      matrix:
        function: [ai-insights, generate-pdf, create-checkout, payment-webhook]
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - run: supabase functions deploy ${{ matrix.function }} --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # TODO(P6.5): add SCIM, webhooks, dispatch-webhook functions

  # ----------------------------------------------------------------------
  # Build mobile (EAS Build)
  # ----------------------------------------------------------------------
  mobile:
    name: Build Mobile (EAS)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: NODE_OPTIONS="--no-experimental-strip-types" pnpm --filter @elogbook/mobile expo prebuild --clean
      - name: Build Android (EAS)
        run: |
          eas build --platform android --non-interactive --no-wait 2>&1 || echo "EAS_BUILD_EXIT_CODE=$?"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
