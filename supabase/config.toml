project_id = "elogbook"

[db]
port = 54322

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback", "elogbook://auth/callback", "http://localhost:8081/*"]
jwt_expiry = 3600
# P2.16: enterprise-grade auth — admin-invite-only (no self-signup),
# email confirmation required, timeboxed sessions.
enable_signup = false

[auth.email]
enable_confirmations = true
enable_autoconfirm = false
# SMTP must be configured at the Supabase project level. Local dev
# can use a local SMTP catcher (e.g. MailHog on :1025) or the
# inbucket included in the local Supabase stack.
# smtp_host = "<SMTP_HOST>"
# smtp_port = 587
# smtp_user = "<SMTP_USER>"
# smtp_pass = "<SMTP_PASS>"
# smtp_admin_email = "admin@elogbook.example"
# smtp_sender_name = "E-Logbook"

[auth.sessions]
# P2.16: timebox PHI access to 8h absolute, 30 min idle.
timebox = true
timebox_duration = 28800  # 8h
inactivity_timeout = 1800  # 30 min

[auth.rate_limit]
token_refresh = 30
signup = 5
login = 10

[auth.mfa]
# P6.1: TOTP MFA enabled; required for director+ at app level.
max_enrolled_factors = 5

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public"]

[edge_runtime]
enabled = true
policy = "per_worker"

[analytics]
enabled = false

[storage]
enabled = true
file_size_limit = "20MB"

[functions]
enabled = true
verify_jwt = true
import_map = "./import_map.json"

[functions.generate-pdf]
[functions.ai-insights]
[functions.payment-webhook]
[functions.create-checkout]

# ---------------------------------------------------------------------------
# P7.6 — Database backups (PITR) and Branching
#
# PITR (Point-in-Time Recovery) and scheduled logical backups are configured
# at the Supabase PROJECT LEVEL, not in this file. The CLI's `config.toml`
# governs the local Docker stack. The presence of this block is a
# documentation marker — the CLI ignores unknown sections.
#
# To enable PITR + branching on the managed project:
#   1. Open the Supabase dashboard: https://app.supabase.com/project/<ref>
#   2. Settings → Database → "Enable Point in Time Recovery" (Pro plan+).
#      Target retention: 7 days (matches the SC-013 RPO of ≤1h with a wide
#      safety margin).
#   3. Settings → Database → "Backups" → confirm a daily logical backup
#      exists. PITR is a superset of the logical backups.
#   4. Settings → Branches → toggle "Enable Branching" so every PR gets a
#      preview database via `supabase branches create` /
#      `supabase link --branch`.
#
# The full restore procedure is documented in `docs/operations.md`
# (Disaster Recovery → "Restore via PITR").
# ---------------------------------------------------------------------------
[db.backups]
# Project-level setting (dashboard). Declared here for discoverability.
enabled = true
# Retention window in days. Pro plan supports up to 7; larger plans up to 90.
retention_days = 7

[branches]
# Project-level setting (dashboard). Toggling this lets the GitHub Action
# in .github/workflows/preview-branch.yml spawn a transient Supabase
# project for each PR. See `docs/operations.md` §"Preview branches".
enabled = true
