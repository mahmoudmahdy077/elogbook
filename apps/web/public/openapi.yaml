          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
        "400":
          description: Query error
        "401":
          description: Unauthorized

  # ============= Reports: Evaluations CSV =============
  /api/{tenant}/reports/evaluations.csv:
    parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: exportEvaluationsCsv
      summary: Export faculty evaluations as CSV
      description: |
        Exports faculty evaluation records as CSV. Residents cannot
