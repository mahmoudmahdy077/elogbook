# ============================================================================
# Paths — Supabase Edge Functions
# ============================================================================
  /functions/v1/ai-insights:
    post:
      operationId: aiInsights
      summary: Generate AI-powered educational insights
      description: |
        Analyzes de-identified case entries to provide educational
        insights for medical residents. Supports multiple AI providers
        (OpenAI, Anthropic, OpenRouter, Azure, custom). Results are cached
        in-memory for 5 minutes.

        **Safety constraints:**
        - All data must be de-identified (`is_deidentified: true`)
        - The function blocks medical diagnosis, prescription, and prognosis
        - A mandatory disclaimer is appended to every response
        - Rate limited to 20 queries per minute per resident
      tags: [Edge Functions, AI]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiInsightsRequest'
      responses:
        "200":
          description: AI insight generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiInsightsResponse'
        "400":
          description: Invalid request or missing fields
        "401":
          description: Invalid or missing auth token
        "403":
          description: AI not enabled, quota exceeded, or PHI detected
        "429":
          description: Rate limit exceeded
        "502":
          description: AI provider error

  /functions/v1/generate-pdf:
    post:
      operationId: generatePdf
      summary: Generate PDF case report
      description: |
        Generates a PDF document containing approved case entries for a
        resident. Uses pdf-lib to create a professional report with
        case dates and template details. Rate limited to 10 PDFs per
        minute per user.
      tags: [Edge Functions, Reports]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePdfRequest'
      responses:
        "200":
          description: PDF document
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid request (missing fields, too many cases)
        "401":
          description: Unauthorized
        "404":
          description: No valid cases found
        "429":
          description: Too many PDF requests
        "500":
          description: Failed to generate PDF

  /functions/v1/payment-webhook:
    post:
      operationId: paymentWebhook
      summary: Stripe payment webhook handler
      description: |
        Processes incoming Stripe webhook events. Verifies signatures
        using per-tenant webhook secrets. Handles:
        - `checkout.session.completed` — activates subscriptions
        - `customer.subscription.deleted` — marks subscriptions canceled
        - `invoice.paid` — updates subscription periods

        Supports mode isolation (test vs live events matched to
        the correct gateway config). Deduplication via `stripe_events`
        table.
      tags: [Edge Functions, Billing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Stripe webhook payload
      responses:
        "200":
          description: Event received and processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StripeEvent'
        "400":
          description: Missing signature or no active gateway config
        "500":
          description: Server configuration error

  /functions/v1/dispatch-webhook:
    post:
      operationId: dispatchWebhook
      summary: Dispatch tenant webhook events
      description: |
        Internal function invoked by database triggers. Looks up all
        active webhooks for a tenant matching the event type, signs the
        payload with HMAC-SHA256, and POSTs to each endpoint. Records
        delivery results in `tenant_webhook_deliveries`.
      tags: [Edge Functions, Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispatchWebhookRequest'
      responses:
        "200":
          description: Events dispatched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispatchWebhookResponse'
        "400":
          description: Missing required fields
        "405":
          description: Method not allowed (POST required)
        "500":
          description: Server error

  /functions/v1/sso-callback:
    get:
      operationId: ssoCallback
      summary: SSO callback broker (SAML/OIDC)
      description: |
        Initiates SSO flow by redirecting the browser to the configured
        IdP's authorize URL. Validates the tenant has an active SSO
        config before redirecting. Supports SAML and OIDC protocols.
      tags: [Edge Functions, Authentication]
      parameters:
        - name: tenant
          in: query
          required: true
          schema:
            type: string
          description: Tenant slug
        - name: protocol
          in: query
          required: true
          schema:
            type: string
            enum: [saml, oidc]
        - name: metadata
          in: query
          schema:
            type: string
        - name: discovery
          in: query
          schema:
            type: string
        - name: next
          in: query
          schema:
            type: string
          description: Post-auth redirect path
      responses:
        "302":
          description: Redirect to IdP authorize URL
        "400":
          description: Missing or invalid parameters
        "404":
          description: Tenant or SSO config not found
        "500":
          description: Server misconfiguration

  /functions/v1/scim:
    get:
      operationId: scimListUsers
      summary: SCIM list users
      description: |
        Lists all users for the authenticated tenant. Returns SCIM 2.0
        ListResponse format. Requires a valid SCIM bearer token.
      tags: [Edge Functions, SCIM]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: SCIM user list
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/ScimListResponse'
        "401":
          description: Invalid or missing bearer token
        "500":
          description: Server error
    post:
      operationId: scimCreateUser
      summary: SCIM create user
      description: |
        Creates a new user via the `invite_user` RPC. Sends an invite
        email and creates the profile. Requires a valid SCIM bearer token.
      tags: [Edge Functions, SCIM]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              type: object
              properties:
                schemas:
                  type: array
                  items:
                    type: string
                userName:
                  type: string
                  format: email
                name:
                  type: object
                  properties:
                    givenName:
                      type: string
                    familyName:
                      type: string
                role:
                  type: string
                  enum: [resident, supervisor, director, admin, institution_admin]
                active:
                  type: boolean
      responses:
        "201":
          description: User created
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/ScimUser'
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "500":
          description: Server error

  /functions/v1/scim/v2/Users:
    get:
      operationId: scimListUsersV2
      summary: SCIM v2 list users
      tags: [Edge Functions, SCIM]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: SCIM user list
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/ScimListResponse'
    post:
      operationId: scimCreateUserV2
      summary: SCIM v2 create user
      tags: [Edge Functions, SCIM]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              type: object
      responses:
        "201":
          description: User created
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/ScimUser'

  /functions/v1/scim/v2/Users/{id}:
    get:
      operationId: scimGetUser
      summary: SCIM get user by ID
      tags: [Edge Functions, SCIM]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: SCIM user
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/ScimUser'
        "404":
          description: User not found
    patch:
      operationId: scimPatchUser
      summary: SCIM update user (partial)
      description: |
        Updates user role or active state. Accepts role mapping from
        SCIM roles to E-Logbook roles.
      tags: [Edge Functions, SCIM]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              type: object
              properties:
                role:
                  type: string
                active:
                  type: boolean
      responses:
        "200":
          description: User updated
          content:
            application/scim+json:
              schema:
                $ref: '#/components/schemas/ScimUser'
        "404":
          description: User not found
    delete:
      operationId: scimDeleteUser
      summary: SCIM soft-delete user
      description: |
        Soft-disables a user by setting `disabled_at`. Returns 204
        on success.
      tags: [Edge Functions, SCIM]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: User soft-disabled (no content)

  /functions/v1/create-checkout:
    post:
      operationId: createCheckoutSession
      summary: Create Stripe checkout session
      description: |
        Creates a Stripe Checkout Session for a subscription plan.
        Requires director, institution_admin, or admin role. Rate
        limited to 5 requests per minute per tenant.
      tags: [Edge Functions, Billing]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckoutRequest'
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCheckoutResponse'
        "400":
          description: Invalid request or gateway not configured
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions
        "404":
          description: Plan not found
        "429":
          description: Rate limited
        "500":
          description: Failed to create session

  /functions/v1/list-invoices:
    get:
      operationId: listInvoices
      summary: List Stripe invoices
      description: |
        Lists recent invoices for a customer from Stripe.
        Requires authentication with a valid JWT.
      tags: [Edge Functions, Billing]
      security:
        - BearerAuth: []
      parameters:
        - name: customer_id
          in: query
          required: true
          schema:
            type: string
          description: Stripe customer ID
      responses:
        "200":
          description: Invoice list
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoices:
                    type: array
                    items:
                      type: object
                      description: Stripe invoice object
        "400":
          description: Missing customer_id
        "401":
          description: Unauthorized
        "404":
          description: User not found
        "405":
          description: Method not allowed

# ============================================================================
# Database RPCs (Supabase)
# ============================================================================
x-rpcs:
  - name: approve_case
    summary: Approve a case entry
    description: |
      Sets a case entry status to 'approved' and creates an approval
      record. Requires supervisor, director, institution_admin, or admin
      role. Tenant-scoped — caller must belong to the same tenant as the case.
    params:
      - name: p_entry_id
        type: uuid
        required: true
        description: ID of the case entry to approve
      - name: p_supervisor_id
        type: uuid
        required: true
        description: Supervisor's auth user ID
      - name: p_comment
        type: text
        required: false
        default: null
        description: Optional approval comment
    returns:
      type: jsonb
      properties:
        success:
          type: boolean
        entry_id:
          type: uuid
        approval_id:
          type: uuid
        status:
          type: string
          enum: [approved]
        error:
          type: string
        code:
          type: string
    grant: authenticated

  - name: reject_case
    summary: Reject a case entry
    description: |
      Sets a case entry status to 'rejected' and creates a rejection
      record. Requires supervisor, director, institution_admin, or admin
      role. Tenant-scoped.
    params:
      - name: p_entry_id
        type: uuid
        required: true
      - name: p_supervisor_id
        type: uuid
        required: true
      - name: p_comment
        type: text
        required: false
        default: null
    returns:
      type: jsonb
      properties:
        success:
          type: boolean
        entry_id:
          type: uuid
        approval_id:
          type: uuid
        status:
          type: string
          enum: [rejected]
    grant: authenticated

  - name: get_case_stats
    summary: Get case statistics
    description: |
      Returns aggregated case statistics (counts by status, specialty,
      month) for a tenant. Optionally filtered by resident. Role-aware:
      residents can only query their own stats.
    params:
      - name: p_tenant_id
        type: uuid
        required: true
        description: Tenant ID
      - name: p_resident_id
        type: uuid
        required: false
        default: null
        description: Optional resident filter
    returns:
      type: jsonb
      properties:
        pending:
          type: integer
        approved:
          type: integer
        rejected:
          type: integer
        draft:
          type: integer
        total:
          type: integer
        error:
          type: string
    grant: authenticated

  - name: check_rate_limit
    summary: Atomic rate-limit check and increment
    description: |
      Atomically checks and increments a rate-limit counter. Creates or
      resets the window if expired. Used by API routes and edge functions.
    params:
      - name: p_key
        type: text
        required: true
        description: Rate limit key (e.g., `action:tenant_id` or `pdf:user_id`)
      - name: p_max
        type: integer
        required: false
        default: 30
        description: Maximum requests in the window
      - name: p_window_seconds
        type: integer
        required: false
        default: 60
        description: Time window in seconds
    returns:
      type: jsonb
      properties:
        allowed:
          type: boolean
        count:
          type: integer
        limit:
          type: integer
        retry_after:
          type: integer
    grant: authenticated, service_role

  - name: consume_ai_quota
    summary: Atomic AI quota consumption
    description: |
      Atomically checks and increments AI query quota for a resident.
      Prevents race conditions where two concurrent requests both pass
      the quota check. Only the function can mutate `quota_used`.
    params:
      - name: p_resident_id
        type: uuid
        required: true
      - name: p_count
        type: integer
        required: false
        default: 1
    returns:
      type: jsonb
      properties:
        success:
          type: boolean
        code:
          type: string
        quota_used:
          type: integer
        quota_limit:
          type: integer
    grant: authenticated

  - name: grant_ai_quota
    summary: Grant AI quota (admin only)
    description: |
      Resets or top-ups AI query quota for a resident. Only director,
      institution_admin, or admin can call this.
    params:
      - name: p_resident_id
        type: uuid
        required: true
      - name: p_new_limit
        type: integer
        required: true
      - name: p_reset
        type: boolean
        required: false
        default: true
        description: Whether to reset used count to 0
    returns:
      type: jsonb
    grant: authenticated

  - name: store_tenant_webhook
    summary: Create or update a webhook with encrypted secret
    description: |
      Inserts or updates a tenant webhook, encrypting the secret via
      pgp_sym_encrypt. Requires institution_admin or admin role.
      Max 10 webhooks per tenant.
    params:
      - name: p_url
        type: text
        required: true
      - name: p_events
        type: text[]
        required: true
      - name: p_secret
        type: text
        required: true
      - name: p_description
        type: text
        required: false
        default: null
      - name: p_is_active
        type: boolean
        required: false
        default: true
      - name: p_webhook_id
        type: uuid
        required: false
        default: null
        description: Set to update an existing webhook
    returns:
      type: jsonb
    grant: authenticated

  - name: hash_patient_mrn
    summary: Hash a patient MRN
    description: |
      Returns a SHA-256 hash of the patient MRN using a per-tenant salt.
      Used to store de-identified patient references.
    params:
      - name: p_mrn
        type: text
        required: true
      - name: p_tenant_id
        type: uuid
        required: true
    returns:
      type: text
      description: Hex-encoded SHA-256 hash
    grant: authenticated

  - name: calculate_age_at_procedure
    summary: Calculate patient age at procedure date
    description: |
      Computes the patient's age in whole years at the date of a procedure.
    params:
      - name: p_dob
        type: date
        required: true
      - name: p_procedure_date
        type: date
        required: true
    returns:
      type: integer
    grant: authenticated

  - name: get_tenant_id
    summary: Get current tenant ID from JWT
    description: |
      Returns the tenant_id from the caller's JWT app_metadata. Used
      extensively in RLS policies and other RPCs.
    returns:
      type: uuid
    grant: authenticated

  - name: get_user_role
    summary: Get current user role from JWT
    description: |
      Returns the user_role from the caller's JWT app_metadata.
    returns:
      type: text
    grant: authenticated

  - name: hash_scim_token
    summary: Hash a SCIM bearer token
    description: |
      Returns SHA-256 hash of a SCIM provisioning token for secure storage.
    params:
      - name: p_token
        type: text
        required: true
    returns:
      type: text
    grant: service_role

  - name: decrypt_with_version
    summary: Decrypt a value with a specific key version
    params:
      - name: p_encrypted
        type: bytea
        required: true
      - name: p_version
        type: integer
        required: true
    returns:
      type: text
    grant: service_role

  - name: rotate_encryption_key
    summary: Rotate encryption key (re-encrypt all values)
    params:
      - name: p_old_version
        type: integer
        required: true
      - name: p_new_version
        type: integer
        required: true
    returns:
      type: jsonb
    grant: service_role

  - name: rotate_mrn_salt
    summary: Rotate MRN hashing salt for a tenant
    params:
      - name: p_tenant_id
        type: uuid
        required: true
    returns:
      type: jsonb
    grant: authenticated

x-database-triggers:
  - name: enforce_case_status_transition
    summary: Enforce valid case status transitions
    description: |
      BEFORE UPDATE trigger on `case_entries` that ensures only valid
      status transitions are allowed (e.g., draft → pending, pending →
      approved/rejected).
  - name: block_lapsed_tenant_submit
    summary: Block case submission for lapsed subscriptions
    description: |
      BEFORE INSERT trigger on `case_entries` that prevents residents
      in institutions with lapsed subscriptions from submitting cases.
  - name: reject_audit_mutation
    summary: Prevent direct mutation of audit_logs
    description: |
      BEFORE trigger that prevents direct INSERT/UPDATE/DELETE on the
      `audit_logs` table. Audit entries are append-only.
  - name: handle_new_user
    summary: Create profile on user signup
    description: |
      AFTER INSERT trigger on `auth.users` that creates a corresponding
      profile entry in the `profiles` table.
  - name: audit_config_change
    summary: Audit config table changes
    description: |
      AFTER trigger on configuration tables that logs changes to the
      audit trail.
