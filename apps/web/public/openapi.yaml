            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
        "400":
          description: Query error
        "401":
          description: Unauthorized
        "403":
