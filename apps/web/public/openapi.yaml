openapi: "3.0.3"
info:
  title: E-Logbook Enterprise API
  description: |
    API for the E-Logbook Enterprise platform — a medical resident case-logging
    and faculty evaluation system with multi-tenant support, SSO, AI-powered
    educational insights, payment integration, and SCIM user provisioning.

    ## Authentication
    Most endpoints require JWT authentication via Supabase Auth. Pass the access
    token as a Bearer token in the `Authorization` header. Public endpoints
    (health, SSO check) do not require authentication.

    Edge Functions use Supabase's built-in JWT verification through the
    shared `authenticate()` helper.
  version: "1.0.0"
  contact:
    name: E-Logbook Support
    url: https://elogbook.dev
servers:
  - url: https://app.elogbook.dev
    description: Production server
  - url: http://localhost:3000
    description: Local development
  - url: https://{tenant}.elogbook.dev
    description: Tenant-specific subdomain
    variables:
      tenant:
        default: demo
        description: Tenant slug

# ============================================================================
# Components
# ============================================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase JWT access token
    ServiceRole:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase service_role key (admin operations)

  schemas:
    # --------------- Common ---------------
    Error:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
      required: [error]

    Success:
      type: object
      properties:
        success:
          type: boolean
          example: true

    # --------------- Health ---------------
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, error]
        database:
          type: string
          enum: [reachable, unreachable]
        durationMs:
          type: integer
        error:
          type: string

    # --------------- SSO Check ---------------
    SsoCheckResponse:
      type: object
      properties:
        available:
          type: boolean
        protocol:
          type: string
          enum: [saml, oidc]
        error:
          type: string

    # --------------- AI Config ---------------
    AiConfigRequest:
      type: object
      required: [model]
      properties:
        provider:
          type: string
          enum: [openai, openrouter, anthropic, azure, custom]
          description: AI provider name
        model:
          type: string
          description: Model identifier (e.g., gpt-4, claude-3-opus)
        is_active:
          type: boolean
          default: false
        endpoint_url:
          type: string
          format: uri
          description: Custom endpoint URL (for Azure/custom providers)
        api_key:
          type: string
          description: API key for the provider (required for new configs)
    AiConfigResponse:
      type: object
      properties:
        success:
          type: boolean
        has_key:
          type: boolean

    # --------------- Assign Role ---------------
    AssignRoleRequest:
      type: object
      required: [user_id, role]
      properties:
        user_id:
          type: string
          format: uuid
          description: Profile ID of the target user
        role:
          type: string
          enum: [resident, supervisor, director, institution_admin, admin]
    AssignRoleResponse:
      $ref: '#/components/schemas/Success'

    # --------------- Payment Gateway ---------------
    PaymentGatewayRequest:
      type: object
      required: [publishable_key]
      properties:
        provider:
          type: string
          enum: [stripe]
          default: stripe
        publishable_key:
          type: string
        is_active:
          type: boolean
          default: false
        endpoint_url:
          type: string
          format: uri
        secret_key:
          type: string
        webhook_secret:
          type: string
    PaymentGatewayResponse:
      $ref: '#/components/schemas/Success'

    # --------------- SSO Config ---------------
    SsoConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
        protocol:
          type: string
          enum: [saml, oidc]
        metadata_url:
          type: string
          format: uri
        discovery_url:
          type: string
          format: uri
        idp_entity_id:
          type: string
        client_id:
          type: string
        default_role:
          type: string
          default: resident
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SsoConfigCreateRequest:
      type: object
      required: [protocol]
      properties:
        protocol:
          type: string
          enum: [saml, oidc]
        metadata_url:
          type: string
          format: uri
          description: Required for SAML
        discovery_url:
          type: string
          format: uri
          description: Required for OIDC
        idp_entity_id:
          type: string
        idp_certificate:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
        default_role:
          type: string
          enum: [resident, supervisor, director, institution_admin]
        is_active:
          type: boolean
          default: true
    SsoConfigUpdateRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        protocol:
          type: string
          enum: [saml, oidc]
        metadata_url:
          type: string
          format: uri
        discovery_url:
          type: string
          format: uri
        idp_entity_id:
          type: string
        idp_certificate:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
        default_role:
          type: string
          enum: [resident, supervisor, director, institution_admin]
        is_active:
          type: boolean
    SsoConfigListResponse:
      type: object
      properties:
        configs:
          type: array
          items:
            $ref: '#/components/schemas/SsoConfig'
    SsoConfigCreateResponse:
      type: object
      properties:
        config:
          $ref: '#/components/schemas/SsoConfig'

    # --------------- Webhooks ---------------
    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
            enum: [case.created, case.updated, case.submitted, case.approved, case.rejected, case.deleted]
        is_active:
          type: boolean
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_sent:
          type: string
          format: date-time
          nullable: true
        last_status:
          type: integer
          nullable: true
        last_succeeded:
          type: boolean
          nullable: true
    WebhookCreateRequest:
      type: object
      required: [url, events, secret]
      properties:
        url:
          type: string
          format: uri
          description: Webhook endpoint URL (HTTPS required in production)
        events:
          type: array
          minItems: 1
          items:
            type: string
            enum: [case.created, case.updated, case.submitted, case.approved, case.rejected, case.deleted]
        secret:
          type: string
          minLength: 8
          description: Shared secret for HMAC-SHA256 signature
        description:
          type: string
        is_active:
          type: boolean
          default: true
    WebhookUpdateRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        secret:
          type: string
          minLength: 8
        description:
          type: string
        is_active:
          type: boolean
    WebhookListResponse:
      type: object
      properties:
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/Webhook'
    WebhookCreateResponse:
      type: object
      properties:
        webhook:
          $ref: '#/components/schemas/Webhook'
    WebhookTestRequest:
      type: object
      required: [webhook_id]
      properties:
        webhook_id:
          type: string
          format: uuid

    # --------------- Approval Actions ---------------
    ApprovalActionRequest:
      type: object
      required: [action, entry_id]
      properties:
        action:
          type: string
          enum: [approve, reject]
        entry_id:
          type: string
          format: uuid
          description: ID of the case entry to approve/reject
        comment:
          type: string
          nullable: true
    ApprovalActionResponse:
      type: object
      properties:
        success:
          type: boolean
        action:
          type: string
          enum: [approve, reject]

    # --------------- Audit Export ---------------
    AuditExportParams:
      type: object
      properties:
        startDate:
          type: string
          format: date
          description: Inclusive lower bound
        endDate:
          type: string
          format: date
          description: Inclusive upper bound
        format:
          type: string
          enum: [csv, pdf]
          default: csv

    # --------------- Compliance Export ---------------
    ComplianceExportParams:
      type: object
      required: [section]
      properties:
        section:
          type: string
          enum: [data-access, phi-inventory, consent, retention]
        format:
          type: string
          enum: [csv, pdf]
          default: csv

    # --------------- Reports ---------------
    ReportCSVParams:
      type: object
      properties:
        date_from:
          type: string
          format: date
        date_to:
          type: string
          format: date

    # --------------- AI Insights ---------------
    AiInsightsRequest:
      type: object
      required: [resident_id]
      properties:
        resident_id:
          type: string
          format: uuid
          description: Profile ID of the resident
        query:
          type: string
          maxLength: 1000
          description: Educational reflection query
        stream:
          type: boolean
          default: false
        is_deidentified:
          type: boolean
          const: true
          description: Must be true — PHI cannot be sent to external AI
    AiInsightsResponse:
      type: object
      properties:
        response:
          type: string
          description: AI-generated educational insight
        tokens_used:
          type: integer
          nullable: true
        disclaimer_rendered:
          type: boolean
        safety_flags:
          type: array
          items:
            type: string
        model:
          type: string
        cached:
          type: boolean

    # --------------- Generate PDF ---------------
    GeneratePdfRequest:
      type: object
      required: [case_ids, resident_name, tenant]
      properties:
        case_ids:
          type: array
          maxItems: 100
          items:
            type: string
            format: uuid
          description: IDs of approved case entries to include
        resident_name:
          type: string
        tenant:
          type: string
          description: Tenant slug

    # --------------- Payment Webhook ---------------
    StripeEvent:
      type: object
      properties:
        received:
          type: boolean
        duplicate:
          type: boolean

    # --------------- Dispatch Webhook ---------------
    DispatchWebhookRequest:
      type: object
      required: [tenant_id, event_type, event_id]
      properties:
        tenant_id:
          type: string
          format: uuid
        event_type:
          type: string
        event_id:
          type: string
        data:
          type: object
          description: Arbitrary event payload
    DispatchWebhookResponse:
      type: object
      properties:
        delivered:
          type: integer
        results:
          type: array
          items:
            type: object
            properties:
              webhook_id:
                type: string
                format: uuid
              status:
                type: integer
              ok:
                type: boolean

    # --------------- SCIM ---------------
    ScimUser:
      type: object
      properties:
        schemas:
          type: array
          items:
            type: string
          example: [urn:ietf:params:scim:schemas:core:2.0:User]
        id:
          type: string
        userName:
          type: string
        name:
          type: object
          properties:
            givenName:
              type: string
              nullable: true
            familyName:
              type: string
              nullable: true
        emails:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              primary:
                type: boolean
        active:
          type: boolean
        meta:
          type: object
          properties:
            resourceType:
              type: string
            created:
              type: string
            lastModified:
              type: string
    ScimListResponse:
      type: object
      properties:
        schemas:
          type: array
          items:
            type: string
        totalResults:
          type: integer
        Resources:
          type: array
          items:
            $ref: '#/components/schemas/ScimUser'
    ScimError:
      type: object
      properties:
        schemas:
          type: array
          items:
            type: string
        status:
          type: integer
        detail:
          type: string
        scimType:
          type: string

    # --------------- Create Checkout ---------------
    CreateCheckoutRequest:
      type: object
      required: [plan_id]
      properties:
        plan_id:
          type: string
          format: uuid
        gateway:
          type: string
          default: stripe
    CreateCheckoutResponse:
      type: object
      properties:
        sessionId:
          type: string
          description: Stripe Checkout Session ID

    # --------------- List Invoices ---------------
    ListInvoicesParams:
      type: object
      properties:
        customer_id:
          type: string
          description: Stripe customer ID

    # --------------- SSO Callback ---------------
    SsoCallbackParams:
      type: object
      required: [tenant, protocol]
      properties:
        tenant:
          type: string
          description: Tenant slug
        protocol:
          type: string
          enum: [saml, oidc]
        metadata:
          type: string
        discovery:
          type: string
        next:
          type: string
          description: Redirect path after authentication

    # --------------- RPC Common ---------------
    RpcSuccess:
      type: object
      properties:
        success:
          type: boolean
    RpcError:
      type: object
      properties:
        error:
          type: string
        code:
          type: string

# ============================================================================
# Paths — Next.js API Routes
# ============================================================================
paths:
  # ============= System =============
  /api/health:
    get:
      operationId: healthCheck
      summary: Health check
      description: |
        Returns the current health status of the application, including
        database connectivity. Does not require authentication.
      tags: [System]
      responses:
        "200":
          description: Application is healthy or degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ============= CSP =============
  /api/csp-violation:
    post:
      operationId: reportCspViolation
      summary: Report CSP violation
      description: |
        Endpoint for Content Security Policy violation reports.
        Logs violations server-side. Does not require authentication.
      tags: [System]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: CSP violation report (standard csp-report format)
      responses:
        "204":
          description: Violation reported (no content)

  # ============= SSO Check =============
  /api/sso/check:
    get:
      operationId: ssoCheck
      summary: Check SSO availability
      description: |
        Public endpoint to check whether a tenant has SSO configured.
        Used by the login page to show/hide the "SSO Login" button.
      tags: [Authentication]
      parameters:
        - name: tenant
          in: query
          required: true
          schema:
            type: string
          description: Tenant slug
      responses:
        "200":
          description: SSO availability status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoCheckResponse'
        "400":
          description: Missing tenant slug
        "404":
          description: Tenant not found
        "500":
          description: Server configuration error

  # ============= AI Config =============
  /api/{tenant}/admin/ai-config:
    parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
        description: Tenant slug
    post:
      operationId: upsertAiConfig
      summary: Create or update AI provider configuration
      description: |
        Configure (create or update) the AI provider settings for a tenant.
        Requires institution_admin or admin role. CSRF protected.
      tags: [Admin]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiConfigRequest'
      responses:
        "200":
          description: Configuration saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiConfigResponse'
        "400":
          description: Validation error (missing model, etc.)
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions or tenant mismatch
        "429":
          description: Rate limited
        "500":
          description: Internal server error
    put:
      operationId: updateAiConfig
      summary: Update AI provider configuration (alias for POST)
      tags: [Admin]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiConfigRequest'
      responses:
        "200":
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiConfigResponse'

  # ============= Assign Role =============
  /api/{tenant}/admin/assign-role:
    parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: assignRole
      summary: Assign a role to a user within the tenant
      description: |
        Updates a user's role. Requires institution_admin or admin role.
        Also updates the user's app_metadata in Supabase Auth.
      tags: [Admin]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRoleRequest'
      responses:
        "200":
          description: Role assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignRoleResponse'
        "400":
          description: Missing or invalid fields
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions
        "404":
          description: Target user not found
        "429":
          description: Rate limited

  # ============= Payment Gateway =============
  /api/{tenant}/admin/payment-gateway:
    parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: upsertPaymentGateway
      summary: Create or update payment gateway configuration
      description: |
        Configure Stripe payment gateway for a tenant. Keys are encrypted
        at rest. Requires institution_admin or admin role.
      tags: [Admin, Billing]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentGatewayRequest'
      responses:
        "200":
          description: Gateway configuration saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentGatewayResponse'
        "400":
          description: Missing publishable key
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions
        "429":
          description: Rate limited
    put:
      operationId: updatePaymentGateway
      summary: Update payment gateway configuration (alias for POST)
      tags: [Admin, Billing]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentGatewayRequest'
      responses:
        "200":
          description: Gateway configuration updated

  # ============= SSO Config =============
  /api/{tenant}/admin/sso:
    parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: listSsoConfigs
      summary: List SSO configurations
      description: |
        Returns all SSO configurations for the tenant. Requires director,
        institution_admin, or admin role.
      tags: [Admin, Authentication]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: SSO config list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoConfigListResponse'
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions
    post:
      operationId: createSsoConfig
      summary: Create an SSO configuration
      description: |
        Creates a new SAML or OIDC SSO configuration for the tenant.
        Max 1 config per protocol per tenant. Requires institution_admin
        or admin role.
      tags: [Admin, Authentication]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoConfigCreateRequest'
      responses:
        "201":
          description: SSO config created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoConfigCreateResponse'
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions
        "409":
          description: A config for this protocol already exists
        "429":
          description: Rate limited
    put:
      operationId: updateSsoConfig
      summary: Update an SSO configuration
      tags: [Admin, Authentication]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoConfigUpdateRequest'
      responses:
        "200":
          description: SSO config updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions
        "404":
          description: Config not found
    delete:
      operationId: deleteSsoConfig
      summary: Delete an SSO configuration
      tags: [Admin, Authentication]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: SSO config ID to delete
      responses:
        "200":
          description: SSO config deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        "400":
          description: Missing config ID
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions
        "404":
          description: Config not found

  # ============= Webhooks =============
  /api/{tenant}/admin/webhooks:
    parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: listWebhooks
      summary: List webhooks
      description: |
        Returns all webhook configurations for the tenant, with latest
        delivery status. Requires director, institution_admin, or admin role.
      tags: [Admin, Webhooks]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Webhook list with delivery status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookListResponse'
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions
    post:
      operationId: createWebhook
      summary: Create a webhook
      description: |
        Creates a new webhook that fires on case events. Max 10 webhooks
        per tenant. Requires institution_admin or admin role.
      tags: [Admin, Webhooks]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookCreateRequest'
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookCreateResponse'
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions
        "429":
          description: Rate limited
    put:
      operationId: updateWebhook
      summary: Update a webhook
      tags: [Admin, Webhooks]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookUpdateRequest'
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions
        "404":
          description: Webhook not found
    delete:
      operationId: deleteWebhook
      summary: Delete a webhook
      tags: [Admin, Webhooks]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Webhook ID to delete
      responses:
        "200":
          description: Webhook deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        "400":
          description: Missing webhook ID
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions
        "404":
          description: Webhook not found

  # ============= Webhook Test =============
  /api/{tenant}/admin/webhooks/test:
    parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: testWebhook
      summary: Test a webhook endpoint
      description: |
        Sends a test payload to a webhook URL to verify connectivity.
        Rate limited to 5 requests per minute per user.
      tags: [Admin, Webhooks]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookTestRequest'
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                type: object
                description: Result of the test delivery
        "400":
          description: Missing webhook_id
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions
        "404":
          description: Webhook not found
        "429":
          description: Rate limited

  # ============= Approval Actions =============
  /api/{tenant}/approvals/action:
    parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: approvalAction
      summary: Approve or reject a case entry
      description: |
        Server-side approval endpoint that calls the `approve_case` or
        `reject_case` RPC with CSRF and rate-limit enforcement.
        Dispatches webhook events on success. Requires supervisor,
        director, institution_admin, or admin role.
      tags: [Approvals]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalActionRequest'
      responses:
        "200":
          description: Action processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalActionResponse'
        "400":
          description: Invalid action or missing fields
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions or tenant mismatch
        "404":
          description: Entry not found
        "429":
          description: Rate limited
        "500":
          description: RPC error

  # ============= Audit Export =============
  /api/{tenant}/audit/export:
    parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: exportAuditLogs
      summary: Export audit logs
      description: |
        Exports audit logs as CSV or PDF with optional date range filter.
        Respects tenant isolation. Requires director, institution_admin,
        or admin role. Rate limited to 10 requests per minute.
      tags: [Compliance]
      security:
        - BearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Inclusive lower bound
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: Inclusive upper bound
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, pdf]
            default: csv
      responses:
        "200":
          description: Exported file (CSV or PDF)
          content:
            text/csv:
              schema:
                type: string
                description: CSV file download
            application/pdf:
              schema:
                type: string
                format: binary
                description: PDF file download
        "400":
          description: Invalid format
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions
        "429":
          description: Rate limited

  # ============= Compliance Export =============
  /api/{tenant}/compliance/export:
    parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: exportComplianceReport
      summary: Export compliance report
      description: |
        Exports compliance data (data-access, PHI inventory, consent
        records, or retention status) as CSV or HTML. Requires director,
        institution_admin, or admin role. Rate limited to 10 requests
        per minute.
      tags: [Compliance]
      security:
        - BearerAuth: []
      parameters:
        - name: section
          in: query
          required: true
          schema:
            type: string
            enum: [data-access, phi-inventory, consent, retention]
          description: Compliance section to export
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, pdf]
            default: csv
      responses:
        "200":
          description: Compliance export file
          content:
            text/csv:
              schema:
                type: string
            text/html:
              schema:
                type: string
        "400":
          description: Invalid section or format
        "401":
          description: Unauthorized
        "403":
          description: Insufficient permissions
        "429":
          description: Rate limited

  # ============= Export PDF =============
  /api/{tenant}/export-pdf:
    parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: exportCasePdf
      summary: Export approved cases as PDF
      description: |
        Generates a PDF report of the current user's approved cases by
        calling the `generate-pdf` edge function. Rate limited.
      tags: [Reports]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: PDF report
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized
        "403":
          description: Tenant mismatch
        "404":
          description: No approved cases to export
        "429":
          description: Rate limited
        "502":
          description: Edge function error
        "504":
          description: PDF generation timed out

  # ============= Reports: Duty Hours CSV =============
  /api/{tenant}/reports/duty-hours.csv:
    parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: exportDutyHoursCsv
      summary: Export duty hours as CSV
      description: |
        Exports duty period records as a CSV file. Residents see their
        own records only; higher roles see all records for the tenant.
        Supports optional date filtering.
      tags: [Reports]
      security:
        - BearerAuth: []
      parameters:
        - name: date_from
